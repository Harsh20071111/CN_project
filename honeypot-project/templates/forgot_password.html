<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Global Trust Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background:
                radial-gradient(circle at 5% 5%, rgba(14, 165, 233, 0.18), transparent 28rem),
                radial-gradient(circle at 95% 15%, rgba(20, 184, 166, 0.16), transparent 26rem),
                linear-gradient(180deg, #f8fafc 0%, #eaf2f7 100%);
        }
        .auth-card {
            border-radius: 8px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        }
        .auth-input {
            border-radius: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .auth-input:focus {
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.16);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Navigation -->
    <nav class="bg-slate-950/95 shadow-md backdrop-blur">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex-shrink-0 text-white font-extrabold text-2xl tracking-tight flex items-center">
                        <span class="mr-2 inline-flex h-9 w-9 items-center justify-center rounded-md bg-cyan-400 text-slate-950">
                            <i class="fa-solid fa-building-columns"></i>
                        </span>
                        GTBank
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="auth-card max-w-md w-full space-y-8 bg-white/90 p-8 sm:p-10 backdrop-blur">
            <div>
                <div class="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-md bg-cyan-100 text-cyan-800">
                    <i class="fa-solid fa-key text-xl"></i>
                </div>
                <h2 class="mt-2 text-center text-3xl font-extrabold tracking-tight text-slate-950">
                    Reset Password
                </h2>
                <p class="mt-2 text-center text-sm text-gray-600">
                    Enter your User ID to receive a reset link.
                </p>
            </div>
            
            {% if error %}
            <div class="bg-blue-50 border-l-4 border-blue-500 p-4 mb-4">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <i class="fa-solid fa-circle-info text-blue-500"></i>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-blue-700">
                            {{ error }}
                        </p>
                    </div>
                </div>
            </div>
            {% endif %}

            {% if success %}
            <div class="bg-green-50 border-l-4 border-green-500 p-4 mb-4">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <i class="fa-solid fa-check text-green-500"></i>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-green-700">
                            {{ success }}
                        </p>
                    </div>
                </div>
            </div>
            {% else %}
            <form class="mt-8 space-y-6" action="/forgot-password" method="POST">
                <div class="rounded-md shadow-sm -space-y-px">
                    <div class="mb-4">
                        <label for="username" class="sr-only">User ID</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-regular fa-user text-gray-400"></i>
                            </div>
                            <input id="username" name="username" type="text" required class="auth-input appearance-none relative block w-full px-3 py-3 pl-10 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:border-cyan-600 focus:z-10 sm:text-sm" placeholder="User ID">
                        </div>
                    </div>
                </div>

                <div>
                    <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-md text-white bg-cyan-700 hover:bg-cyan-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cyan-500 transition duration-200 shadow-lg shadow-cyan-900/10">
                        Send Reset Link
                    </button>
                </div>
            </form>
            {% endif %}
            
            <div class="text-center mt-4">
                <a href="/" class="text-sm font-semibold text-cyan-700 hover:text-cyan-900">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Back to Login
                </a>
            </div>
        </div>
    </main>

</body>
</html>
